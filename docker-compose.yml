services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-acy_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ChangeMe_StrongPassword!}
      POSTGRES_DB: ${POSTGRES_DB:-acy_quotation}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-acy_admin} -d ${POSTGRES_DB:-acy_quotation}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [acy_net]

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-acy_admin}:${POSTGRES_PASSWORD:-ChangeMe_StrongPassword!}@db:5432/${POSTGRES_DB:-acy_quotation}?schema=public
      PGHOST: db
      PGUSER: ${POSTGRES_USER:-acy_admin}
      PGPASSWORD: ${POSTGRES_PASSWORD:-ChangeMe_StrongPassword!}
      PGDATABASE: ${POSTGRES_DB:-acy_quotation}
    volumes:
      - storage:/app/storage
    networks: [acy_net]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on: [app]
    ports:
      - "${HOST_PORT:-8090}:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    networks: [acy_net]

  backup:
    build:
      context: .
      dockerfile: deploy/backup.Dockerfile
    init: true
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-acy_admin}:${POSTGRES_PASSWORD:-ChangeMe_StrongPassword!}@db:5432/${POSTGRES_DB:-acy_quotation}?schema=public
      PGHOST: db
      PGUSER: ${POSTGRES_USER:-acy_admin}
      PGPASSWORD: ${POSTGRES_PASSWORD:-ChangeMe_StrongPassword!}
      PGDATABASE: ${POSTGRES_DB:-acy_quotation}
    volumes:
      - storage:/app/storage
    networks: [acy_net]

networks:
  acy_net:
    driver: bridge

volumes:
  pgdata:
  storage:
