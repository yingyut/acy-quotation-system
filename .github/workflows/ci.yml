name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      # Dummy values so `next build` and `prisma generate` have what they
      # need at build time - no live database is required for either step.
      DATABASE_URL: postgresql://user:password@localhost:5432/acy_quotation?schema=public
      NEXTAUTH_SECRET: ci-only-secret-not-used-in-production
      NEXTAUTH_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build
        run: npm run build
